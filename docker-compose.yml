services:
  simulation-app:
    image: ghcr.io/gldemonti/rc-model-building-simulation:latest
    pull_policy: always
    container_name: simulation-app
    ports:
      - "8050:8050"
    volumes:
      - ./projects:/app/projects
      - ./data:/app/data
    environment:
      - VM2_DATA_DIR=/app/data